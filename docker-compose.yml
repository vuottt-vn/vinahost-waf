version: '3.8'

services:
  waf-proxy:
    build:
      context: .  # MUST be root directory where go.mod exists
      dockerfile: docker/Dockerfile.waf
    container_name: waf-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      - DB_PATH=/app/data/waf.db
      - PROXY_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - WAF_MODE=${WAF_MODE:-on}
      - WAF_CRS_ENABLED=${WAF_CRS_ENABLED:-false}
      - WAF_REQ_BODY_LIMIT=${WAF_REQ_BODY_LIMIT:-131072}
      - WAF_RES_BODY_LIMIT=${WAF_RES_BODY_LIMIT:-131072}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - CHALLENGE_ENABLED=${CHALLENGE_ENABLED:-true}
      - CHALLENGE_TOKEN_TTL=${CHALLENGE_TOKEN_TTL:-30}
      - CHALLENGE_DIFFICULTY=${CHALLENGE_DIFFICULTY:-3}
    volumes:
      - waf-data:/app/data
      - waf-logs:/app/logs
    networks:
      - waf-network

  waf-api:
    build:
      context: .  # MUST be root directory where go.mod exists
      dockerfile: docker/Dockerfile.api
    container_name: waf-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - DB_PATH=/app/data/waf.db
      - API_PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
    volumes:
      - waf-data:/app/data
      - waf-logs:/app/logs
    networks:
      - waf-network

  # Web Frontend - React Dashboard
  waf-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: waf-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - waf-api
    networks:
      - waf-network

volumes:
  waf-data:
  waf-logs:

networks:
  waf-network:
    driver: bridge
